name: Deploy to SAP BTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Job 1: Security Audit + Tests ──────────────────────────────────────────
  audit-and-test:
    name: Security Audit & Test Suite
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js 20
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20.11.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm security audit
        run: npm audit --audit-level=critical
        continue-on-error: true  # Warn on HIGH vulnerabilities; only CRITICAL blocks deployment

      - name: Run test suite
        run: npm test -- --passWithNoTests --forceExit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results.xml
          if-no-files-found: ignore

  # ── Job 2: Build & Deploy ───────────────────────────────────────────────────
  deploy:
    name: Build & Deploy to BTP Cloud Foundry
    runs-on: ubuntu-latest
    needs: audit-and-test
    if: ${{ needs.audit-and-test.result == 'success' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js 20
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20.11.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install MBT build tool
        run: npm install -g mbt

      - name: Install Cloud Foundry CLI v8
        run: |
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
          echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install -y cf8-cli
          cf version

      - name: Install CF MTA plugin
        run: cf install-plugin multiapps -f

      - name: Build CDS artifacts (MANDATORY before mbt)
        run: npx cds build --production

      - name: Build MTA archive
        run: mbt build -t ./

      - name: List generated MTA archive
        run: ls -lh *.mtar

      - name: Login to SAP BTP Cloud Foundry
        env:
          CF_API: ${{ secrets.CF_API }}
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
        run: |
          cf login \
            -a "$CF_API" \
            -u "$CF_USERNAME" \
            -p "$CF_PASSWORD" \
            -o "$CF_ORG" \
            -s "$CF_SPACE"

      - name: Deploy to SAP BTP
        run: cf deploy *.mtar --version-rule ALL -f

      - name: Post-deploy verification
        run: |
          echo "=== Deployed apps ==="
          cf apps
          echo ""
          echo "=== BTP Services ==="
          cf services
          echo ""
          echo "=== Recent logs (last 50 lines) ==="
          cf logs nhvr-bridge-srv --recent | tail -50

      - name: Health check
        continue-on-error: true
        env:
          CF_API: ${{ secrets.CF_API }}
        run: |
          APP_URL="https://592f5a7btrial-dev-nhvr-bridge-app-router.cfapps.us10-001.hana.ondemand.com"
          echo "Checking App Router health: $APP_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL" || echo "000")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
            echo "Health check PASSED"
          else
            echo "Health check returned $STATUS - manual verification required"
          fi

      - name: Rollback on failure
        if: failure()
        run: |
          cf rollback nhvr-bridge-srv || echo "No previous version to rollback to"
          cf rollback nhvr-bridge-app-router || echo "No previous router version"

  # ── Job 3: CodeQL SAST Analysis ────────────────────────────────────────────
  codeql-sast:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
