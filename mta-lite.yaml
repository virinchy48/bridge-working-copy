## ============================================================
## NHVR Bridge Lite — Deployment Descriptor
## Reuses existing XSUAA, HANA, Destination, Logging services.
## Deploys a separate backend with NHVR_APP_MODE=lite set,
## which causes getAppConfig() to return lite feature flags.
## All code intact — features hidden client-side via AppConfig.js.
## ============================================================

_schema-version: "3.1"
ID: nhvr-bridge-lite
description: NHVR Bridge Lite - Bridges, Restrictions, Map
version: 1.0.0
parameters:
    enable-parallel-deployments: true

modules:

# ── Pre-step: build CDS artifacts ────────────────────────
- name: nhvr-bridge-lite-cds-build
  type: custom
  path: .
  build-parameters:
      commands:
        - npx cds build --production
      supported-platforms: []

# ── Lite CAP Backend (same code, NHVR_APP_MODE=lite) ─────
- name: nhvr-bridge-lite-srv
  type: nodejs
  path: gen/srv
  parameters:
      buildpack: nodejs_buildpack
      memory: 512M
      disk-quota: 1G
  build-parameters:
      builder: npm-ci
      requires:
        - name: nhvr-bridge-lite-cds-build
  properties:
      NHVR_APP_MODE: lite
  requires:
    - name: nhvr-db-existing
    - name: nhvr-xsuaa-existing
    - name: nhvr-logging-existing
  provides:
    - name: nhvr-lite-srv-api
      properties:
          srv-url: ${default-url}

# ── Lite App Router ───────────────────────────────────────
- name: nhvr-bridge-lite-router
  type: approuter.nodejs
  path: app-router-lite
  parameters:
      memory: 256M
      disk-quota: 512M
  build-parameters:
      requires:
        - name: nhvr-bridge-lite-ui
          artifacts:
            - "**"
          target-path: resources/nhvr.bridgelite
  requires:
    - name: nhvr-xsuaa-existing
    - name: nhvr-destination-existing
    - name: nhvr-lite-srv-api
      group: destinations
      properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

# ── Lite UI (rsync from main webapp, overlay lite overrides) ─
- name: nhvr-bridge-lite-ui
  type: html5
  path: app-lite
  build-parameters:
      build-result: webapp
      builder: custom
      commands:
        - bash ../scripts/build-lite.sh
      supported-platforms: []

resources:

# ── Reuse ALL existing services — no new service instances ──
- name: nhvr-db-existing
  type: org.cloudfoundry.existing-service
  parameters:
      service-name: nhvr-db

- name: nhvr-xsuaa-existing
  type: org.cloudfoundry.existing-service
  parameters:
      service-name: nhvr-xsuaa

- name: nhvr-destination-existing
  type: org.cloudfoundry.existing-service
  parameters:
      service-name: nhvr-destination

- name: nhvr-logging-existing
  type: org.cloudfoundry.existing-service
  parameters:
      service-name: nhvr-logging
