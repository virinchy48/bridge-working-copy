## ============================================================
## NHVR Bridge IQ v3.0 — Separate BTP Deployment
## Deploy this alongside the existing nhvr-bridge-app WITHOUT
## disturbing it.  All service names use the "-v3" suffix.
##
## Usage:
##   npx cds build --production
##   mbt build -t ./ --mta=mta-v3.yaml
##   cf deploy nhvr-bridge-iq-v3_3.1.0.mtar --version-rule ALL -f
## ============================================================

_schema-version: "3.1"
ID: nhvr-bridge-iq-v3
description: NHVR Bridge IQ Platform v3 — separate from legacy nhvr-bridge-app
version: 3.1.0
parameters:
    enable-parallel-deployments: true

# ─────────────────────────────────────────────────────────────
# MODULES
# ─────────────────────────────────────────────────────────────
modules:

# ── 0. CDS Build (pre-step) ───────────────────────────────────
- name: nhvr-iq-v3-cds-build
  type: custom
  path: .
  build-parameters:
      commands:
        - npx cds build --production
      supported-platforms: []

# ── 1. CAP Backend (Node.js) ──────────────────────────────────
- name: nhvr-iq-v3-srv
  type: nodejs
  path: gen/srv
  parameters:
      buildpack: nodejs_buildpack
      memory: 512M
      disk-quota: 1G
      # Different app name → different URL from existing nhvr-bridge-srv
  build-parameters:
      builder: npm-ci
      requires:
        - name: nhvr-iq-v3-cds-build
  requires:
    - name: nhvr-db-v3
    - name: nhvr-xsuaa-v3
    - name: nhvr-logging-v3
  provides:
    - name: srv-api-v3
      properties:
          srv-url: ${default-url}

# ── 2. HANA DB Deployer ───────────────────────────────────────
- name: nhvr-iq-v3-db-deployer
  type: hdb
  path: gen/db
  parameters:
      buildpack: nodejs_buildpack
      memory: 256M
  build-parameters:
      requires:
        - name: nhvr-iq-v3-cds-build
  requires:
    - name: nhvr-db-v3

# ── 3. App Router (Frontend) ──────────────────────────────────
- name: nhvr-iq-v3-app-router
  type: approuter.nodejs
  path: app-router
  parameters:
      memory: 256M
      disk-quota: 512M
  build-parameters:
      requires:
        - name: nhvr-bridge-management-ui-v3
          artifacts:
            - "**"
          target-path: resources/nhvr.bridgemanagement
  requires:
    - name: nhvr-xsuaa-v3
    - name: nhvr-destination-v3
    - name: srv-api-v3
      group: destinations
      properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

# ── 4. Bridge Management UI ───────────────────────────────────
- name: nhvr-bridge-management-ui-v3
  type: html5
  path: app/bridge-management
  build-parameters:
      build-result: webapp
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []

# ─────────────────────────────────────────────────────────────
# RESOURCES (BTP Services — all use -v3 suffix, separate instances)
# ─────────────────────────────────────────────────────────────
resources:

# ── HANA Cloud (new HDI Container — separate schema from v1) ──
- name: nhvr-db-v3
  type: com.sap.xs.hdi-container
  parameters:
      service: hana
      service-plan: hdi-shared
  properties:
      hdi-service-name: ${service-name}

# ── XSUAA (separate app registration — different xsappname) ───
- name: nhvr-xsuaa-v3
  type: org.cloudfoundry.managed-service
  parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security-v3.json
      config:
          xsappname: nhvr-bridge-iq-v3-${org}-${space}
          tenant-mode: dedicated

# ── Destination Service (separate instance) ───────────────────
- name: nhvr-destination-v3
  type: org.cloudfoundry.managed-service
  parameters:
      service: destination
      service-plan: lite

# ── Application Logging ───────────────────────────────────────
- name: nhvr-logging-v3
  type: org.cloudfoundry.managed-service
  parameters:
      service: application-logs
      service-plan: lite
